version: "3.9"

services:
  db:
    image: timescale/timescaledb:latest-pg15
    container_name: drift_db
    environment:
      POSTGRES_USER: drift
      POSTGRES_PASSWORD: drift_secret
      POSTGRES_DB: drift_sentinel
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U drift -d drift_sentinel"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: drift_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: drift_backend
    env_file:
      - ../.env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - mlflow_artifacts:/mlflow
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: drift_worker
    env_file:
      - ../.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../backend:/app
      - mlflow_artifacts:/mlflow
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.11.1
    container_name: drift_mlflow
    ports:
      - "5001:5000"
    volumes:
      - mlflow_artifacts:/mlflow
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000

volumes:
  pgdata:
  mlflow_artifacts:
